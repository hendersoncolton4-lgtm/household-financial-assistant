# Fly.io configuration for the household financial assistant.
# Apply by running `fly launch --copy-config --name <your-app-name>` (Fly
# will prompt you to pick a unique app name). All secrets (Anthropic, Plaid,
# Alpaca, household password hash, session secret) live in Fly's encrypted
# secret store — `fly secrets set KEY=VALUE` — never in this file.

# The app name is set during `fly launch`. Don't commit a hardcoded name.

primary_region = "iad"  # US East (Ashburn) — closest to most US users; change with `fly regions set`.

[build]
  dockerfile = "Dockerfile"

# Persistent volume for the SQLite database. The volume is created once
# with `fly volumes create data --region iad --size 1`. 1GB is well over
# what a household ever needs.
[mounts]
  source = "data"
  destination = "/app/data"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the machine running so Plaid sync, scheduled tasks, etc. work.
  # The Fly hobby tier covers a single small machine 24/7 within free
  # bandwidth limits.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
